<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КотоВечер 🌙</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-start: #0b0b1a;
  --bg-end: #1a0a2e;
  --bg-mid: #12102a;
  --card-bg: rgba(18, 14, 40, 0.88);
  --card-border: rgba(255, 255, 255, 0.07);
  --text-primary: #e2dff0;
  --text-secondary: #9990b8;
  --accent: #b388eb;
  --accent-hover: #a06cd5;
  --accent-glow: rgba(179, 136, 235, 0.35);
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 40px rgba(179, 136, 235, 0.08);
  --glass-bg: rgba(255, 255, 255, 0.05);
  --btn-text: #0b0b1a;
  --counter-bg: rgba(255, 255, 255, 0.05);
  --footer-text: #554d75;
  --skeleton-from: #1e1a3a;
  --skeleton-to: #2a2550;
  --star-color: rgba(255, 255, 255, 0.7);
  --star-dim: rgba(255, 255, 255, 0.15);
  --moon-glow: rgba(255, 240, 200, 0.15);
  --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg-start: #e8e0f5;
  --bg-end: #f5edfc;
  --bg-mid: #efe8f8;
  --card-bg: rgba(255, 255, 255, 0.88);
  --card-border: rgba(0, 0, 0, 0.06);
  --text-primary: #1a1a2e;
  --text-secondary: #7a70a0;
  --accent: #8b5cf6;
  --accent-hover: #7c3aed;
  --accent-glow: rgba(139, 92, 246, 0.25);
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
  --glass-bg: rgba(255, 255, 255, 0.4);
  --btn-text: #fff;
  --counter-bg: rgba(0, 0, 0, 0.04);
  --footer-text: #888;
  --skeleton-from: #d4cce8;
  --skeleton-to: #e4dcf0;
  --star-color: rgba(100, 80, 160, 0.5);
  --star-dim: rgba(100, 80, 160, 0.15);
  --moon-glow: rgba(139, 92, 246, 0.12);
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
  color: var(--text-primary);
  transition: background var(--transition), color var(--transition);
  padding: 1rem;
  position: relative;
  overflow-x: hidden;
}

/* ===== Starfield Background ===== */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: var(--star-color);
  animation: twinkle var(--duration, 3s) ease-in-out infinite alternate;
  animation-delay: var(--delay, 0s);
}

.star--dim {
  background: var(--star-dim);
}

@keyframes twinkle {
  0%   { opacity: 0.15; transform: scale(0.8); }
  50%  { opacity: 0.6; transform: scale(1.1); }
  100% { opacity: 0.25; transform: scale(0.9); }
}

/* Constellation lines (subtle) */
.constellation {
  position: absolute;
  opacity: 0.04;
}

/* ===== Theme Toggle ===== */
.theme-toggle {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 100;
  background: var(--glass-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--card-border);
  border-radius: 999px;
  width: 3rem;
  height: 3rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.25rem;
  transition: background var(--transition), transform 0.25s ease, border-color var(--transition), box-shadow var(--transition);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
  user-select: none;
}
.theme-toggle:hover {
  transform: scale(1.1) rotate(-8deg);
  background: var(--card-bg);
  box-shadow: 0 0 20px var(--accent-glow);
}
.theme-toggle:active {
  transform: scale(0.95);
}

/* ===== Main Card ===== */
.card {
  position: relative;
  z-index: 1;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  border-radius: 2rem;
  box-shadow: var(--shadow);
  max-width: 480px;
  width: 100%;
  padding: 2rem;
  text-align: center;
  animation: cardEnter 0.7s ease-out;
  transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
}

@keyframes cardEnter {
  0% {
    opacity: 0;
    transform: translateY(40px) scale(0.94);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card__update {
  animation: cardFlip 0.45s ease-out;
}

@keyframes cardFlip {
  0% {
    opacity: 0;
    transform: scale(0.92) rotate(-1deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0);
  }
}

/* ===== Logo / Title ===== */
.logo {
  font-size: 2.8rem;
  line-height: 1;
  margin-bottom: 0.15rem;
  display: inline-block;
  filter: drop-shadow(0 0 12px var(--moon-glow));
  animation: moonGlow 4s ease-in-out infinite alternate;
}

@keyframes moonGlow {
  0%   { filter: drop-shadow(0 0 8px var(--moon-glow)); transform: scale(1); }
  100% { filter: drop-shadow(0 0 20px var(--moon-glow)); transform: scale(1.04); }
}

.title {
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 0.1rem;
  background: linear-gradient(135deg, #b388eb, #7c3aed, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ===== Moon Phase & Time ===== */
.moon-phase-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.625rem;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: color var(--transition);
}

.moon-phase-icon {
  font-size: 1.2rem;
  line-height: 1;
}

.moon-phase-name {
  font-weight: 600;
  color: var(--accent);
  transition: color var(--transition);
}

.greeting {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 1.25rem;
  transition: color var(--transition);
}

.greeting .time-display {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: var(--accent);
  transition: color var(--transition);
}

/* ===== Cat Image ===== */
.image-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 1.25rem;
  overflow: hidden;
  margin-bottom: 1rem;
  background: var(--skeleton-from);
  transition: background var(--transition);
  box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3);
}

.image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.35s ease;
}

.image-wrap img.loading {
  opacity: 0;
}

.image-wrap .skeleton-pulse {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    var(--skeleton-from) 0%,
    rgba(255, 255, 255, 0.06) 50%,
    var(--skeleton-to) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.8s infinite;
  transition: opacity 0.3s ease;
}

.image-wrap .skeleton-pulse.hidden {
  opacity: 0;
  pointer-events: none;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ===== Breed ===== */
.breed {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 0.625rem;
  transition: color var(--transition);
}

/* ===== Fact ===== */
.fact {
  font-size: 1rem;
  line-height: 1.65;
  color: var(--text-primary);
  margin-bottom: 1.25rem;
  min-height: 3.2em;
  transition: color var(--transition);
}

.fact::before {
  content: '\201C';
  font-size: 1.6em;
  color: var(--accent);
  margin-right: 0.08em;
  opacity: 0.4;
  line-height: 0;
  vertical-align: -0.15em;
}

/* ===== Murk Button ===== */
.btn-murk {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: var(--btn-text);
  border: none;
  border-radius: 999px;
  padding: 0.875rem 2.5rem;
  font-family: inherit;
  font-size: 1.125rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.3s ease, background var(--transition);
  box-shadow: 0 4px 20px var(--accent-glow);
  user-select: none;
  position: relative;
  overflow: hidden;
}

.btn-murk::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  border-radius: 999px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.btn-murk:hover::after {
  opacity: 1;
}

.btn-murk:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

.btn-murk:active {
  transform: translateY(0) scale(0.97);
}

.btn-murk:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none !important;
}

.btn-murk .paw {
  display: inline-block;
  font-size: 1.15em;
  transition: transform 0.35s ease;
}

.btn-murk:hover .paw {
  transform: rotate(20deg) scale(1.2);
}

/* ===== Sparkle effect on Murk ===== */
.sparkle-container {
  position: fixed;
  pointer-events: none;
  z-index: 200;
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: sparkleFade 0.8s ease-out forwards;
  pointer-events: none;
}

@keyframes sparkleFade {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(var(--dx, 30px), var(--dy, -30px)) scale(0);
  }
}

/* ===== Counter ===== */
.counter {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 1.25rem;
  padding: 0.5rem 1.25rem;
  background: var(--counter-bg);
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  transition: background var(--transition), color var(--transition);
}

.counter__prefix {
  opacity: 0.8;
}

.counter__num {
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  min-width: 1.8em;
  display: inline-block;
  text-align: center;
  transition: color var(--transition);
}

.counter__num.bump {
  animation: counterBump 0.3s ease;
}

@keyframes counterBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.35); }
  100% { transform: scale(1); }
}

/* ===== Footer ===== */
.footer {
  position: relative;
  z-index: 1;
  margin-top: 2rem;
  font-size: 0.8rem;
  color: var(--footer-text);
  text-align: center;
  transition: color var(--transition);
}

.footer a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.2s, opacity 0.2s;
  opacity: 0.8;
}
.footer a:hover {
  text-decoration: underline;
  opacity: 1;
}

/* ===== Error state ===== */
.error-msg {
  color: #f87171;
  font-size: 0.9rem;
  margin-bottom: 0.625rem;
  display: none;
}
.error-msg.visible {
  display: block;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ===== Connection status indicator ===== */
.connection-status {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  margin-bottom: 0.75rem;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
  opacity: 0.7;
  transition: color var(--transition);
}

.connection-status .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4ade80;
  transition: background 0.3s;
}

.connection-status .dot.offline {
  background: #f87171;
}

/* ===== Responsive ===== */
@media (max-width: 520px) {
  .card { padding: 1.5rem; border-radius: 1.5rem; }
  .logo { font-size: 2.3rem; }
  .title { font-size: 1.45rem; }
  .fact { font-size: 0.925rem; }
  .btn-murk { padding: 0.75rem 2rem; font-size: 1rem; }
  .theme-toggle { top: 0.875rem; right: 0.875rem; width: 2.625rem; height: 2.625rem; font-size: 1.1rem; }
  .greeting { font-size: 0.8rem; }
  .moon-phase-row { font-size: 0.8rem; }
}

@media (max-width: 380px) {
  .card { padding: 1.25rem; }
  .title { font-size: 1.25rem; }
  .logo { font-size: 2rem; }
}
</style>
</head>
<body>

<!-- Starfield canvas -->
<div id="starfield"></div>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
  <span id="themeIcon">☀️</span>
</button>

<!-- Main card -->
<div class="card" id="card">
  <div class="logo">🌙</div>
  <h1 class="title">КотоВечер</h1>

  <!-- Moon phase + time greeting -->
  <div class="moon-phase-row">
    <span class="moon-phase-icon" id="moonPhaseIcon">🌕</span>
    <span class="moon-phase-name" id="moonPhaseName">Полнолуние</span>
    <span>·</span>
    <span class="greeting" id="greeting">
      <span class="time-display" id="timeDisplay">00:00</span>
      <span id="greetingText">вечер</span>
    </span>
  </div>

  <div class="image-wrap" id="imageWrap">
    <div class="skeleton-pulse" id="skeleton"></div>
    <img id="catImage" alt="Ночной котик" class="loading" />
  </div>

  <div class="breed" id="breed">Ночной кот №...</div>
  <div class="error-msg" id="errorMsg">😿 Не удалось загрузить котика</div>

  <p class="fact" id="fact">Нажми «Муркни!», чтобы узнать интересный факт о котах</p>

  <button class="btn-murk" id="btnMurk">
    <span class="paw">🐾</span>
    Муркни!
  </button>

  <div class="counter">
    <span class="counter__prefix">Мурчалок</span>
    <span class="counter__num" id="counterNum">0</span>
  </div>
</div>

<footer class="footer">
  Сотворено с 🌙 для Романа · <a href="https://thecatapi.com" target="_blank" rel="noopener">TheCatAPI</a>
</footer>

<script>
(function() {
  'use strict';

  // ===== DOM refs =====
  const card        = document.getElementById('card');
  const catImage    = document.getElementById('catImage');
  const skeleton    = document.getElementById('skeleton');
  const breedEl     = document.getElementById('breed');
  const factEl      = document.getElementById('fact');
  const btnMurk     = document.getElementById('btnMurk');
  const counterNum  = document.getElementById('counterNum');
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon   = document.getElementById('themeIcon');
  const errorMsg    = document.getElementById('errorMsg');
  const timeDisplay = document.getElementById('timeDisplay');
  const greetingText = document.getElementById('greetingText');
  const moonPhaseIcon = document.getElementById('moonPhaseIcon');
  const moonPhaseName = document.getElementById('moonPhaseName');
  const starfield   = document.getElementById('starfield');

  // ===== State =====
  let isLoading = false;
  let murkCount = 0;
  let timeInterval = null;

  // ===== Starfield =====
  function createStarfield() {
    const COUNT = 120;
    const FRAGMENT = document.createDocumentFragment();

    for (let i = 0; i < COUNT; i++) {
      const star = document.createElement('div');
      star.className = 'star' + (i % 5 === 0 ? ' star--dim' : '');
      const size = 1 + Math.random() * 2.5;
      star.style.cssText = [
        'width:' + size + 'px',
        'height:' + size + 'px',
        'left:' + (Math.random() * 100) + '%',
        'top:' + (Math.random() * 100) + '%',
        '--duration:' + (2 + Math.random() * 4) + 's',
        '--delay:' + (Math.random() * 5) + 's',
      ].join(';');
      FRAGMENT.appendChild(star);
    }

    // Constellation: a few subtle line patterns
    for (let c = 0; c < 3; c++) {
      const lines = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      lines.setAttribute('class', 'constellation');
      lines.setAttribute('width', '100%');
      lines.setAttribute('height', '100%');
      lines.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
      const cx = Math.random() * 80 + 10;
      const cy = Math.random() * 80 + 10;
      const pts = Array.from({length: 5}, () => ({
        x: cx + (Math.random() - 0.5) * 30,
        y: cy + (Math.random() - 0.5) * 30,
      }));
      for (let i = 1; i < pts.length; i++) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', pts[i-1].x + '%');
        line.setAttribute('y1', pts[i-1].y + '%');
        line.setAttribute('x2', pts[i].x + '%');
        line.setAttribute('y2', pts[i].y + '%');
        line.setAttribute('stroke', 'rgba(255,255,255,0.08)');
        line.setAttribute('stroke-width', '0.5');
        lines.appendChild(line);
      }
      FRAGMENT.appendChild(lines);
    }

    starfield.appendChild(FRAGMENT);
  }

  createStarfield();

  // ===== Time & Greeting =====
  function getGreeting(h) {
    if (h >= 5 && h < 12) return 'утро';
    if (h >= 12 && h < 17) return 'день';
    if (h >= 17 && h < 22) return 'вечер';
    return 'ночь';
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function updateTime() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    timeDisplay.textContent = pad(h) + ':' + pad(m);
    greetingText.textContent = getGreeting(h);
  }

  // ===== Moon Phase =====
  function getMoonPhase(day) {
    // Simple cycle: day 1-29.5 mapped to phases
    const phase = (day % 29.53) / 29.53; // 0 to ~1
    if (phase < 0.03 || phase >= 0.97) return { icon: '🌕', name: 'Полнолуние' };
    if (phase < 0.10) return { icon: '🌖', name: 'Убывающая луна' };
    if (phase < 0.22) return { icon: '🌗', name: 'Последняя четверть' };
    if (phase < 0.33) return { icon: '🌘', name: 'Убывающий серп' };
    if (phase < 0.47) return { icon: '🌑', name: 'Новолуние' };
    if (phase < 0.55) return { icon: '🌒', name: 'Растущий серп' };
    if (phase < 0.67) return { icon: '🌓', name: 'Первая четверть' };
    if (phase < 0.78) return { icon: '🌔', name: 'Растущая луна' };
    if (phase < 0.88) return { icon: '🌕', name: 'Прибывающая луна' };
    return { icon: '🌕', name: 'Полнолуние' };
  }

  function updateMoonPhase() {
    const now = new Date();
    const day = now.getDate() + now.getMonth() * 30.44; // approximate
    const phase = getMoonPhase(day);
    moonPhaseIcon.textContent = phase.icon;
    moonPhaseName.textContent = phase.name;
  }

  // Init time & moon
  updateTime();
  updateMoonPhase();
  timeInterval = setInterval(updateTime, 30000);

  // ===== Theme =====
  function getStoredTheme() {
    try { return localStorage.getItem('catday2-theme') || 'dark'; }
    catch { return 'dark'; }
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
    try { localStorage.setItem('catday2-theme', theme); } catch {}
  }

  setTheme(getStoredTheme());

  themeToggle.addEventListener('click', function() {
    const current = document.documentElement.getAttribute('data-theme');
    setTheme(current === 'dark' ? 'light' : 'dark');
  });

  // ===== Counter =====
  function loadCounter() {
    try {
      const stored = localStorage.getItem('catday2-murk-count');
      murkCount = stored ? parseInt(stored, 10) : 0;
      if (isNaN(murkCount) || murkCount < 0) murkCount = 0;
    } catch { murkCount = 0; }
    counterNum.textContent = murkCount;
  }

  function incrementCounter() {
    murkCount += 1;
    counterNum.textContent = murkCount;
    // Bump animation
    counterNum.classList.remove('bump');
    void counterNum.offsetWidth;
    counterNum.classList.add('bump');
    try { localStorage.setItem('catday2-murk-count', String(murkCount)); } catch {}
  }

  loadCounter();

  // ===== Sparkle effects =====
  function createSparkles(x, y) {
    const container = document.createElement('div');
    container.className = 'sparkle-container';
    container.style.cssText = 'left:' + x + 'px;top:' + y + 'px;';
    const colors = ['#b388eb', '#7c3aed', '#6366f1', '#a78bfa', '#c4b5fd'];
    const count = 10 + Math.floor(Math.random() * 6);
    for (let i = 0; i < count; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      sparkle.style.cssText = [
        '--dx:' + (Math.cos(angle) * dist) + 'px',
        '--dy:' + (Math.sin(angle) * dist) + 'px',
        'background:' + colors[Math.floor(Math.random() * colors.length)],
        'width:' + (3 + Math.random() * 5) + 'px',
        'height:' + (3 + Math.random() * 5) + 'px',
        'animation-duration:' + (0.5 + Math.random() * 0.5) + 's',
      ].join(';');
      container.appendChild(sparkle);
    }
    document.body.appendChild(container);
    setTimeout(function() { container.remove(); }, 1200);
  }

  // ===== API calls =====
  async function fetchCatImage() {
    const resp = await fetch('https://api.thecatapi.com/v1/images/search');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!data || !data.length || !data[0].url) throw new Error('No image data');
    return data[0];
  }

  async function fetchCatFact() {
    const resp = await fetch('https://catfact.ninja/fact');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!data || !data.fact) throw new Error('No fact data');
    return data.fact;
  }

  // ===== Update card =====
  function showError(msg) {
    errorMsg.textContent = msg || '😿 Не удалось загрузить котика';
    errorMsg.classList.add('visible');
  }

  function hideError() {
    errorMsg.classList.remove('visible');
  }

  async function updateCard() {
    if (isLoading) return;
    isLoading = true;
    btnMurk.disabled = true;
    hideError();

    // Start skeleton shimmer
    skeleton.classList.remove('hidden');
    catImage.classList.add('loading');

    // Card update animation
    card.classList.remove('card__update');
    void card.offsetWidth;
    card.classList.add('card__update');

    try {
      const [imgData, fact] = await Promise.all([fetchCatImage(), fetchCatFact()]);

      // Set image
      catImage.onload = function() {
        skeleton.classList.add('hidden');
        catImage.classList.remove('loading');
      };
      catImage.onerror = function() {
        skeleton.classList.add('hidden');
        catImage.classList.remove('loading');
        showError('😿 Картинка не загрузилась');
      };
      catImage.src = imgData.url;

      // Set breed / cat number
      if (imgData.breeds && imgData.breeds.length && imgData.breeds[0].name) {
        breedEl.textContent = imgData.breeds[0].name;
      } else {
        const nicknames = [
          'Ночной кот №1', 'Ночной кот №2', 'Ночной кот №3', 'Ночной кот №4',
          'Лунный кот', 'Таинственный кот', 'Полуночный кот', 'Кот-звезда',
          'Мурзик', 'Васька', 'Черныш', 'Серебряный кот',
          'Кот-призрак', 'Кошачий детектив', 'Сонный Барсик',
        ];
        breedEl.textContent = nicknames[Math.floor(Math.random() * nicknames.length)];
      }

      // Set fact
      factEl.textContent = fact;

      // Update greeting in case time changed
      updateTime();
      updateMoonPhase();

      // Counter + sparkles
      incrementCounter();

      // Generate sparkles at button position
      const rect = btnMurk.getBoundingClientRect();
      createSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2);

    } catch (err) {
      console.error('CatEvening error:', err);
      showError('😿 Не удалось загрузить котика');
      skeleton.classList.add('hidden');
      catImage.classList.remove('loading');
    } finally {
      isLoading = false;
      btnMurk.disabled = false;
    }
  }

  // ===== Click handler =====
  btnMurk.addEventListener('click', updateCard);

  // ===== Initial load with delay =====
  setTimeout(updateCard, 500);

})();
</script>
</body>
</html>
